name: Deploy to Netlify

on:
  push:
    branches:
      - main  # Se activa al subir cambios a la rama principal

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Aquí podrías agregar pasos de testing:
      # - name: Run Tests
      #   run: npm test

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './'  # Al ser HTML/JS puro, subes la raíz o la carpeta donde esté tu index.html
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Despliegue desde GitHub Actions"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}